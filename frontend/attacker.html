<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherSense - Red Team Attack Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --panel-2: #151515;
      --text: #ffffff;
      --muted: #9ca3af;
      --red: #ff4444;
      --green: #00ff88;
      --yellow: #ffff00;
      --gold: #ffd700;
      --orange: #ff8800;
      --line: #262626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "JetBrains Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { width: min(1400px, 94vw); margin: 0 auto; }
    .header { padding: 24px 0 12px; border-bottom: 1px solid var(--line); }
    .title-row { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(22px, 3.2vw, 36px); }
    .live-badge {
      display: inline-flex; align-items: center; gap: 8px; color: #fff;
      border: 1px solid var(--red); background: rgba(255, 68, 68, 0.12); border-radius: 999px; padding: 7px 12px; font-size: 12px;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%; background: #6b7280; display: inline-block;
      transition: background-color 0.2s ease;
    }
    .dot.red { background: var(--red); }
    .pulse { animation: pulse 1.2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.8); }
      70% { box-shadow: 0 0 0 12px rgba(255,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
    }
    .subtitle { margin: 10px 0 0; color: var(--muted); font-size: 13px; }

    .stats {
      margin: 16px 0 0;
      display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr);
    }
    .stat {
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px;
    }
    .stat .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .stat .value { font-size: 23px; font-weight: 800; }
    .stat .value.red { color: var(--red); }

    .attack-grid {
      margin: 18px 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .attack-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left-width: 4px;
      border-radius: 10px;
      padding: 12px;
      display: grid;
      gap: 8px;
      min-height: 235px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .attack-card.active {
      animation: borderPulse 1.4s infinite;
      box-shadow: 0 0 18px rgba(255, 68, 68, 0.18);
    }
    @keyframes borderPulse {
      0%, 100% { border-color: #8b8b8b; }
      50% { border-color: var(--red); }
    }
    .attack-top { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
    .attack-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
    .badge {
      font-size: 11px; border: 1px solid; border-radius: 999px; padding: 3px 8px; white-space: nowrap;
    }
    .ip { color: var(--muted); font-size: 12px; }
    .desc { color: #e5e7eb; font-size: 12px; line-height: 1.35; min-height: 34px; }
    .signal { color: #c4b5fd; font-size: 11px; font-style: italic; }
    .status-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
    .events { font-size: 12px; color: var(--green); }
    .actions { display: flex; gap: 8px; margin-top: auto; }
    .btn {
      flex: 1; border: 1px solid #333; border-radius: 8px; height: 34px; cursor: pointer;
      font-family: inherit; font-size: 12px; font-weight: 700;
    }
    .btn-launch {
      background: #2b0909; border-color: #7f1d1d; color: #ffd0d0;
      box-shadow: inset 0 0 0 1px rgba(255, 68, 68, 0.2);
    }
    .btn-launch:hover { box-shadow: 0 0 12px rgba(255,68,68,0.45); }
    .btn-stop { background: #1f2937; border-color: #374151; color: #d1d5db; }
    .btn-stop:disabled { opacity: 0.45; cursor: not-allowed; }

    .cred { border-left-color: #ef4444; }
    .cred .badge { color: #fecaca; border-color: #ef4444; background: rgba(239,68,68,0.15); }
    .acct { border-left-color: #f97316; }
    .acct .badge { color: #fed7aa; border-color: #f97316; background: rgba(249,115,22,0.15); }
    .bot { border-left-color: #eab308; }
    .bot .badge { color: #fef08a; border-color: #eab308; background: rgba(234,179,8,0.15); }
    .fin { border-left-color: #22c55e; }
    .fin .badge { color: #bbf7d0; border-color: #22c55e; background: rgba(34,197,94,0.14); }
    .adv { border-left-color: #ffd700; }
    .adv .badge { color: #fff5b1; border-color: #ffd700; background: rgba(255,215,0,0.13); }

    .terminal-wrap {
      background: #050505;
      border: 1px solid #1f2937;
      border-radius: 10px;
      margin: 8px 0 30px;
      overflow: hidden;
    }
    .terminal-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: #0b0b0b; border-bottom: 1px solid #1f2937;
      padding: 10px 12px; color: var(--green); font-size: 13px;
    }
    .btn-clear {
      background: transparent; color: #d1d5db; border: 1px solid #374151; border-radius: 8px; padding: 6px 10px; cursor: pointer;
      font-family: inherit; font-size: 12px;
    }
    #terminal-log {
      max-height: 250px; overflow: auto; padding: 10px 12px;
      color: var(--green); font-size: 12px; line-height: 1.4;
    }
    .log-line { margin: 0 0 4px; white-space: pre-wrap; word-break: break-word; }
    .s-normal { color: var(--green); }
    .s-monitoring { color: var(--yellow); }
    .s-blocked { color: var(--red); }
    .s-honeypot { color: var(--gold); }
    .s-rate_limited { color: var(--orange); }

    @media (max-width: 1300px) { .attack-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 1040px) { .attack-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px) {
      .attack-grid { grid-template-columns: repeat(2, 1fr); }
      .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) { .attack-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-row">
        <h1>AetherSense - Red Team Attack Console</h1>
        <div class="live-badge"><span class="dot red pulse"></span> LIVE</div>
      </div>
      <p class="subtitle">Simulated attack environment - all traffic directed to AetherSense Bank backend</p>
      <section class="stats">
        <div class="stat"><div class="label">Total Attacks Launched</div><div id="stat-launched" class="value">0</div></div>
        <div class="stat"><div class="label">Total Events Sent</div><div id="stat-events" class="value">0</div></div>
        <div class="stat"><div class="label">Active Attacks</div><div id="stat-active" class="value red pulse">0</div></div>
      </section>
    </header>

    <main>
      <section id="attack-grid" class="attack-grid"></section>

      <section class="terminal-wrap">
        <div class="terminal-bar">
          <div>● ATTACK TERMINAL - Live Output</div>
          <button id="clear-terminal" class="btn-clear">Clear Terminal</button>
        </div>
        <div id="terminal-log"></div>
      </section>
    </main>
  </div>

  <script>
    const attacks = [
      { key: "fast_stuffing", fileKey: "attack_fast_stuffing", name: "Fast Credential Stuffing", category: "Credential", ip: "203.0.113.47", desc: "High-velocity stolen credential replay", signal: "attempt_rate + failure_rate" },
      { key: "password_spray", fileKey: "attack_password_spray", name: "Password Spraying", category: "Credential", ip: "185.220.101.5", desc: "One password across hundreds of accounts", signal: "unique_users_targeted" },
      { key: "slow_mimicry", fileKey: "attack_slow_mimicry", name: "Slow Mimicry Attack", category: "Credential", ip: "198.51.100.23", desc: "Human-paced bot evading rate limits", signal: "LSTM temporal sequence" },
      { key: "probing_discovery", fileKey: "attack_probing_discovery", name: "Probing Discovery", category: "Credential", ip: "172.16.254.99", desc: "Maps detection threshold before attacking", signal: "threshold_proximity" },
      { key: "ato", fileKey: "attack_ato", name: "ATO Impossible Travel", category: "Account", ip: "103.21.244.8", desc: "Valid credentials, impossible location jump", signal: "geo_velocity" },
      { key: "session_hijack", fileKey: "attack_session_hijack", name: "Session Hijacking", category: "Account", ip: "94.102.49.18", desc: "Replays stolen session token from new device", signal: "device_change_score" },
      { key: "synthetic_identity", fileKey: "attack_synthetic_identity", name: "Synthetic Identity", category: "Account", ip: "45.33.32.156", desc: "Frankenstein identity from multiple breaches", signal: "keystroke_entropy" },
      { key: "headless_browser", fileKey: "attack_headless_browser", name: "Headless Browser Bot", category: "Bot", ip: "45.142.212.100", desc: "Selenium/Puppeteer automated form fill", signal: "keystroke_entropy = 0" },
      { key: "ai_adaptive_bot", fileKey: "attack_ai_adaptive_bot", name: "AI Adaptive Bot", category: "Bot", ip: "77.247.108.9", desc: "RL bot adapting to avoid detection", signal: "baseline_deviation_7d" },
      { key: "ddos", fileKey: "attack_ddos", name: "DDoS Flood", category: "Bot", ip: "10.0.0.1-20", desc: "20 IPs coordinated flood", signal: "attempt_rate extreme" },
      { key: "api_scraping", fileKey: "attack_api_scraping", name: "API Scraping + Honeypot", category: "Bot", ip: "198.98.56.14", desc: "Enumerates all endpoints including traps", signal: "endpoint_entropy + honeypot" },
      { key: "card_testing", fileKey: "attack_card_testing", name: "Card Testing", category: "Financial", ip: "91.108.56.23", desc: "Micro-transactions to validate stolen cards", signal: "session_duration_delta" },
      { key: "zero_day", fileKey: "attack_zero_day", name: "Zero Day Exploit", category: "Advanced", ip: "192.0.2.100", desc: "Unknown exploit caught by behavior only", signal: "Isolation Forest blind catch" },
      { key: "llm_injection", fileKey: "attack_llm_injection", name: "LLM Injection", category: "Advanced", ip: "104.21.45.67", desc: "Prompt injection into auth form fields", signal: "Honeypot input scanner" },
      { key: "deepfake_identity", fileKey: "attack_deepfake_identity", name: "Deepfake Identity", category: "Advanced", ip: "162.158.88.1", desc: "AI-generated synthetic identity at scale", signal: "device_change_score" }
    ];

    const categoryClass = {
      Credential: "cred",
      Account: "acct",
      Bot: "bot",
      Financial: "fin",
      Advanced: "adv"
    };

    const grid = document.getElementById("attack-grid");
    const terminalLog = document.getElementById("terminal-log");
    const launchedEl = document.getElementById("stat-launched");
    const eventsEl = document.getElementById("stat-events");
    const activeEl = document.getElementById("stat-active");

    const state = {
      launched: 0,
      active: {},
      eventsByAttack: {},
      statusByAttack: {},
      waitingLogged: false
    };

    function timeStamp() {
      const d = new Date();
      return d.toTimeString().slice(0, 8);
    }

    function statusClass(status) {
      const key = (status || "NORMAL").toUpperCase();
      if (key === "MONITORING") return "s-monitoring";
      if (key === "BLOCKED") return "s-blocked";
      if (key === "HONEYPOT") return "s-honeypot";
      if (key === "RATE_LIMITED") return "s-rate_limited";
      return "s-normal";
    }

    function addLog(attackName, n, status) {
      const line = document.createElement("div");
      line.className = `log-line ${statusClass(status)}`;
      line.textContent = `[${timeStamp()}] [${attackName}] Event #${n} -> ${status || "NORMAL"}`;
      terminalLog.appendChild(line);
      terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    function renderCards() {
      grid.innerHTML = "";
      attacks.forEach((a) => {
        const active = !!state.active[a.key];
        const events = state.eventsByAttack[a.key] || 0;
        const el = document.createElement("article");
        el.className = `attack-card ${categoryClass[a.category]} ${active ? "active" : ""}`;
        el.id = `card-${a.key}`;
        el.innerHTML = `
          <div class="attack-top">
            <div class="attack-name">${a.name}</div>
            <span class="badge">${a.category}</span>
          </div>
          <div class="ip">${a.ip}</div>
          <div class="desc">${a.desc}</div>
          <div class="signal">${a.signal}</div>
          <div class="status-row">
            <span><span class="dot ${active ? "red pulse" : ""}" id="dot-${a.key}"></span> ${active ? "ACTIVE" : "IDLE"}</span>
            <span class="events" id="events-${a.key}">Events: ${events}</span>
          </div>
          <div class="actions">
            <button class="btn btn-launch" data-launch="${a.key}">Launch</button>
            <button class="btn btn-stop" data-stop="${a.key}" ${active ? "" : "disabled"}>Stop</button>
          </div>
        `;
        grid.appendChild(el);
      });
    }

    async function callApi(path, body) {
      const res = await fetch(`http://localhost:5000${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      try { return await res.json(); } catch { return {}; }
    }

    async function launchAttack(key) {
      const a = attacks.find((x) => x.key === key);
      if (!a) return;
      await callApi("/api/attack/start", { attack_type: a.fileKey });
      state.launched += 1;
      state.active[key] = true;
      refreshStats();
      renderCards();
    }

    async function stopAttack(key) {
      const a = attacks.find((x) => x.key === key);
      if (!a) return;
      await callApi("/api/attack/stop", { attack_type: a.fileKey });
      state.active[key] = false;
      refreshStats();
      renderCards();
    }

    function refreshStats() {
      const totalEvents = Object.values(state.eventsByAttack).reduce((sum, n) => sum + (n || 0), 0);
      const activeCount = Object.values(state.active).filter(Boolean).length;
      launchedEl.textContent = String(state.launched);
      eventsEl.textContent = String(totalEvents);
      activeEl.textContent = String(activeCount);
      activeEl.classList.toggle("pulse", activeCount > 0);
    }

    async function pollAttackStatus() {
      try {
        const res = await fetch("http://localhost:5000/api/attack/status");
        const data = await res.json();
        state.waitingLogged = false;
        const seen = new Set();

        (Array.isArray(data) ? data : []).forEach((item) => {
          const raw = String(item.attack_type || "");
          const key = raw.startsWith("attack_") ? raw.slice(7) : raw;
          const attack = attacks.find((a) => a.key === key || a.fileKey === raw);
          if (!attack) return;
          seen.add(attack.key);
          const prev = state.eventsByAttack[attack.key] || 0;
          const curr = Number(item.events_sent || 0);
          state.active[attack.key] = true;
          state.eventsByAttack[attack.key] = curr;
          if (curr > prev) {
            const status = state.statusByAttack[attack.key] || "NORMAL";
            addLog(attack.name, curr, status);
          }
        });

        attacks.forEach((a) => {
          if (!seen.has(a.key)) state.active[a.key] = false;
        });

        refreshStats();
        renderCards();
      } catch {
        if (!state.waitingLogged) {
          const line = document.createElement("div");
          line.className = "log-line s-rate_limited";
          line.textContent = "[SYSTEM] Waiting for backend connection...";
          terminalLog.appendChild(line);
          terminalLog.scrollTop = terminalLog.scrollHeight;
          state.waitingLogged = true;
        }
      }
    }

    grid.addEventListener("click", (e) => {
      const launchKey = e.target.getAttribute("data-launch");
      const stopKey = e.target.getAttribute("data-stop");
      if (launchKey) launchAttack(launchKey);
      if (stopKey) stopAttack(stopKey);
    });

    document.getElementById("clear-terminal").addEventListener("click", () => {
      terminalLog.innerHTML = "";
    });

    renderCards();
    refreshStats();
    pollAttackStatus();
    setInterval(pollAttackStatus, 2000);
  </script>
</body>
</html>
