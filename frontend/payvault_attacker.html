<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smurfing Attacker Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --atk-bg: #0A0A0A;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --green: #10B981;
            --amber: #F59E0B;
            --orange: #EA580C;
            --red: #EF4444;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background: var(--atk-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .col-atk { width: 100%; max-width: 800px; height: 100%; display: flex; flex-direction: column; padding: 30px; }

        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; letter-spacing: 2px;}
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 24px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Attacker Console Styles */
        .atk-btn { border: none; padding: 14px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: all 0.2s; width: 100%; color: white; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-launch { background: var(--red); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); font-size: 1.1rem; letter-spacing: 1px;}
        .btn-launch:active { transform: scale(0.98); }
        .btn-stop { background: #333; }
        .btn-reset { background: transparent; border: 1px solid var(--border); font-size: 0.9rem;}
        .btn-reset:hover { background: rgba(255,255,255,0.05); }

        .terminal { background: #000; border: 1px solid #333; border-radius: 8px; flex: 1; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; overflow-y: auto; margin-bottom: 24px; color: #A3A3A3; line-height: 1.6; }
        .terminal-line { margin-bottom: 6px; animation: fadeIn 0.2s; }
        .tl-green { color: var(--green); }
        .tl-amber { color: var(--amber); }
        .tl-orange { color: var(--orange); }
        .tl-red { color: var(--red); text-shadow: 0 0 5px rgba(239,68,68,0.5); font-weight: bold;}

        .atk-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;}
        .atk-stat-box { background: rgba(255,0,0,0.05); border: 1px solid rgba(239,68,68,0.2); padding: 16px; border-radius: 8px; text-align: center;}
        .atk-stat-box span { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 600;}
        .atk-stat-box strong { font-family: 'JetBrains Mono'; font-size: 1.5rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="col-atk">
        <h2 style="color: var(--red);">
            Financial Attack Console
            <span style="font-size: 0.7rem; color: #fff; background: var(--red); padding: 4px 10px; border-radius: 4px; letter-spacing: normal;">OFFENSIVE MODE</span>
        </h2>

        <div class="card" style="border-color: rgba(239, 68, 68, 0.3);">
            <div style="font-family: 'JetBrains Mono'; font-size: 1rem; line-height: 1.6;">
                <div style="margin-bottom: 8px;"><span style="color: var(--red); font-weight: bold;">Source:</span> PV-004821 (Rahul Mehta)</div>
                <div style="margin-bottom: 8px;"><span style="color: var(--red); font-weight: bold;">Target:</span> RBI Threshold ₹10,000</div>
                <div><span style="color: var(--red); font-weight: bold;">Strategy:</span> Transaction Structuring (Smurfing via 20 Mules)</div>
            </div>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 20px;">
            <button class="atk-btn btn-launch" onclick="startAttack()">LAUNCH BOT ATTACK //></button>
            <button class="atk-btn btn-stop" onclick="stopAttack()" style="width: auto; padding: 0 30px;">STOP</button>
        </div>
        
        <div class="atk-stats">
            <div class="atk-stat-box">
                <span>Transactions Fired</span>
                <strong id="atk-txns">0</strong>
            </div>
            <div class="atk-stat-box">
                <span>Successfully Moved</span>
                <strong id="atk-success" style="color: var(--green)">₹0</strong>
            </div>
            <div class="atk-stat-box">
                <span>Currently in Escrow</span>
                <strong id="atk-escrow" style="color: var(--amber)">₹0</strong>
            </div>
            <div class="atk-stat-box">
                <span>Net Laundered</span>
                <strong id="atk-laundered" style="color: var(--red)">₹0</strong>
            </div>
        </div>

        <div class="terminal" id="atk-terminal">
            <div style="color: #666;">> System Ready. Waiting to launch smurfing sequence...</div>
        </div>
        
        <button class="atk-btn btn-reset" onclick="resetDemo()">RESET AGENT STATE</button>
    </div>

    <script>
        const socket = io("http://localhost:5000");

        // State trackers
        let txnCount = 0;
        let totalSuccessfullyMoved = 0;
        let currentlyInEscrow = 0;

        // Format currency
        const formatC = (num) => "₹" + num.toLocaleString('en-IN');

        socket.on("connect", () => {
             console.log("Connected to backend");
             document.getElementById('atk-terminal').innerHTML += `<div style="color: var(--green);">> Connection established to AetherSense Core.</div>`;
        });

        socket.on("aml_update", (data) => {
            txnCount++;
            if (data.status === "COMPLETED") {
                totalSuccessfullyMoved += data.amount;
            } else if (data.status === "HELD") {
                currentlyInEscrow += data.amount;
            }
            updateStats();
            addToTerminal(data);
        });

        socket.on("aml_threat_update", (data) => {
            if(data.action === "reverse_all") {
                document.getElementById('atk-escrow').textContent = "₹0";
                currentlyInEscrow = 0;
                
                const terminal = document.getElementById('atk-terminal');
                const time = new Date().toLocaleTimeString();
                terminal.innerHTML += `<div class="terminal-line tl-red" style="margin-top: 10px;">[${time}] !! CRITICAL !! ACCOUNT FROZEN. REVERSAL DETECTED. !!</div>`;
                terminal.scrollTop = terminal.scrollHeight;
            }
        });

        function addToTerminal(data) {
            const terminal = document.getElementById('atk-terminal');
            const time = new Date().toLocaleTimeString();
            let cClass = "tl-green";
            if (data.risk_score > 30) cClass = "tl-amber";
            if (data.risk_score > 55) cClass = "tl-orange";
            if (data.risk_score >= 75) cClass = "tl-red";

            terminal.innerHTML += `<div class="terminal-line ${cClass}">[${time}] TXN ${formatC(data.amount)} → ${data.recipient_name} | RISK: ${data.risk_score} | ST: ${data.status}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateStats() {
            document.getElementById('atk-txns').textContent = txnCount;
            document.getElementById('atk-success').textContent = formatC(totalSuccessfullyMoved);
            document.getElementById('atk-escrow').textContent = formatC(currentlyInEscrow);
        }

        // API Actions
        function startAttack() {
            fetch("http://localhost:5000/api/attack/start", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({attack_type: "smurfing"})
            });
            document.getElementById('atk-terminal').innerHTML += `<div style="color: var(--blue);">> Initiating distributed transaction flood...</div>`;
        }
        function stopAttack() {
            fetch("http://localhost:5000/api/attack/stop", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({attack_type: "smurfing"})
            });
            document.getElementById('atk-terminal').innerHTML += `<div style="color: var(--orange);">> STOP signal sent. Aborting operations.</div>`;
        }
        function resetDemo() {
            fetch("http://localhost:5000/api/aml/reset", { method: "POST" }).then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
